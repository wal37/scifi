<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="20" y1="14" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1C33"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 64) rotate(90) scale(24)">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.38" stop-color="#74D9FF"/>
      <stop offset="0.72" stop-color="#356CFF"/>
      <stop offset="1" stop-color="#0A1122"/>
    </radialGradient>
    <linearGradient id="ring" x1="28" y1="30" x2="99" y2="98" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7AE4FF"/>
      <stop offset="0.52" stop-color="#8D7BFF"/>
      <stop offset="1" stop-color="#6CFFCC"/>
    </linearGradient>
    <linearGradient id="link" x1="40" y1="31" x2="86" y2="94" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8DE7FF"/>
      <stop offset="1" stop-color="#A3FF75"/>
    </linearGradient>
    <filter id="softGlow" x="-30" y="-30" width="188" height="188" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-20" y="-20" width="168" height="168" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="30" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="49" fill="url(#ring)" fill-opacity="0.08"/>
  <circle cx="64" cy="64" r="39" stroke="url(#ring)" stroke-width="4"/>
  <circle cx="64" cy="64" r="24" fill="url(#orb)" filter="url(#softGlow)"/>

  <g stroke="url(#link)" stroke-width="4.2" stroke-linecap="round" opacity="0.98">
    <path d="M64 40L90 51"/>
    <path d="M64 40L40 51"/>
    <path d="M90 51L90 78"/>
    <path d="M40 51L40 78"/>
    <path d="M64 88L40 78"/>
    <path d="M64 88L90 78"/>
    <path d="M64 40L64 88"/>
  </g>

  <g filter="url(#nodeGlow)">
    <circle cx="64" cy="40" r="7" fill="#9EECFF">
      <animate attributeName="opacity" values="0.82;1;0.82" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="51" r="7" fill="#B2FF83">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="78" r="7" fill="#7BD0FF">
      <animate attributeName="opacity" values="0.78;1;0.78" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="88" r="7" fill="#C29BFF">
      <animate attributeName="opacity" values="0.74;1;0.74" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="78" r="7" fill="#8DF7D1">
      <animate attributeName="opacity" values="0.72;1;0.72" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="51" r="7" fill="#7FE4FF">
      <animate attributeName="opacity" values="0.76;1;0.76" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <circle cx="64" cy="64" r="8" fill="#F8FBFF"/>
  <circle cx="64" cy="64" r="3" fill="#B9FF6B"/>
</svg>
